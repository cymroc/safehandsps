backend:
  name: git-gateway
  branch: main

media_folder: gallery
public_folder: /gallery

collections:
  - name: gallery
    label: Gallery Photos
    label_singular: Photo
    folder: gallery
    create: true
    identifier_field: photo
    fields:
      - { label: Photo, name: photo, widget: image }
      - { label: Caption, name: caption, widget: string, required: false, hint: "Short description of the work shown (optional)" }
